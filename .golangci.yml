version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
  settings:
    errcheck:
      exclude-functions:
        - (*github.com/charmbracelet/bubbletea.Program).Send
        - (*database/sql.Rows).Close
        - (*database/sql.Tx).Rollback
        - (*os.File).Close
        - (io.Closer).Close
        - os.Remove
        - fmt.Sscanf
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST1000"
  exclusions:
    paths:
      - testdata
    rules:
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - staticcheck
        text: "SA1019:"
